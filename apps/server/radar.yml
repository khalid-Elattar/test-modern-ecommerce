# radar.yml — Project Configuration
# Generated by: radar init
# Modify this file to match your project. Run: radar validate

mode: warn

stack:
  language: TypeScript
  framework: NestJS
  orm: Mongoose
  runtime: node

architecture: layered

layers:
  - name: interfaces
    path: "src/**/interfaces/**"
  - name: application
    path: "src/**/services/**"
  - name: api
    path: "src/**/controllers/**"

modules:
  - name: ai
    path: "src/ai/**"
  - name: app
    path: "src/app/**"
  - name: cart
    path: "src/cart/**"
  - name: cloudinary
    path: "src/cloudinary/**"
  - name: guards
    path: "src/guards/**"
  - name: orders
    path: "src/orders/**"
  - name: products
    path: "src/products/**"
  - name: strategies
    path: "src/strategies/**"
  - name: users
    path: "src/users/**"

data_volumes:
  carts: S
  orders: L
  products: S
  users: M

maintainability:
  require_tests: false
  ignore_tests_for:
    - guard
    - interceptor
    - decorator
    - strategy
